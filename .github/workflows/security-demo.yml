name: Security Demo

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run security:demo
      - run: npm run lint
